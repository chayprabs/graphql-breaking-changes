name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @graphql-guard/core build

      - name: Build CLI
        run: pnpm --filter @graphql-guard/cli build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm --filter @graphql-guard/web build

      - name: Bundle size check
        run: |
          INITIAL=$(du -sb packages/web/dist/assets/index*.js packages/web/dist/assets/graphql*.js packages/web/dist/assets/federation*.js 2>/dev/null | awk '{s+=$1} END {print s+0}')
          MONACO=$(du -sb packages/web/dist/assets/monaco*.js 2>/dev/null | awk '{s+=$1} END {print s+0}')
          echo "Initial route JS: $INITIAL bytes"
          echo "Monaco lazy chunk: $MONACO bytes"
          if [ "$INITIAL" -eq 0 ]; then
            echo "No initial JS bundle found"
            exit 1
          fi
          if [ "$INITIAL" -gt 1572864 ]; then
            echo "Initial bundle exceeds 1.5 MB PRD budget"
            exit 1
          fi

      - name: Install Playwright
        run: pnpm exec playwright install chromium --with-deps
        working-directory: packages/web

      - name: E2E tests
        run: pnpm test:e2e
        working-directory: packages/web
