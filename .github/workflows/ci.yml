name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @graphql-guard/core build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm --filter @graphql-guard/web build

      - name: Bundle size check
        run: |
          SIZE=$(du -sb packages/web/dist/assets/*.js 2>/dev/null | awk '{s+=$1} END {print s+0}')
          echo "Total JS bytes: $SIZE"
          if [ "$SIZE" -gt 1572864 ]; then
            echo "Bundle exceeds 1.5 MB budget"
            exit 1
          fi

      - name: Install Playwright
        run: pnpm exec playwright install chromium --with-deps
        working-directory: packages/web

      - name: E2E tests
        run: pnpm test:e2e
        working-directory: packages/web
